# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
    branches:
      - main
  # Manual escape hatch: redeploy main's head without pushing a commit,
  # e.g. after a deploy failed for a transient reason (DB waking up, etc.)
  workflow_dispatch:
jobs:
  deploy:
    name: Deploy app
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    concurrency: deploy-group    # optional: ensure only one action runs at a time
    env:
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - uses: actions/checkout@v6
      - name: Login to Docker Hardened Images registry
        uses: docker/login-action@v4
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to Fly.io registry
        uses: docker/login-action@v4
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}
      - name: Build and push image
        run: |
          docker build -t "registry.fly.io/books-tracker:$DEPLOY_SHA" .
          docker push "registry.fly.io/books-tracker:$DEPLOY_SHA"
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --image "registry.fly.io/books-tracker:$DEPLOY_SHA"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
